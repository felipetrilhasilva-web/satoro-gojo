<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Reader UI</title>
    <style>
        /* CSS - Estilização */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #ff4757;
            --text: #ffffff;
            --accent: #2f3542;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: var(--card-bg);
            border-bottom: 3px solid var(--primary);
            margin-bottom: 30px;
        }

        .manga-container {
            max-width: 400px;
            width: 90%;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .manga-cover {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .info {
            padding: 20px;
            text-align: center;
        }

        .info h2 {
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--accent);
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        button:disabled {
            background: #57606f;
            cursor: not-allowed;
        }

        #capitulo-atual {
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Manga<span>Viewer</span></h1>
    </header>

    <div class="manga-container">
        <img id="manga-img" src="https://images.tcdn.com.br/img/img_prod/1041630/manga_one_piece_volume_101_5691_1_2583804d9c02d1f4356e87a2d46e3097.jpg" alt="Capa do Mangá" class="manga-cover">
        
        <div class="info">
            <h2 id="manga-titulo">One Piece</h2>
            <p>Eiichiro Oda</p>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="mudarCapitulo(-1)">Anterior</button>
            <span id="capitulo-label">Cap. <span id="capitulo-numero">1</span></span>
            <button id="nextBtn" onclick="mudarCapitulo(1)">Próximo</button>
        </div>
    </div>

    <script>
        // JavaScript - Lógica de navegação
        let capituloAtual = 1;
        const totalCapitulos = 10; // Limite fictício

        const numDisplay = document.getElementById('capitulo-numero');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const mangaImg = document.getElementById('manga-img');

        function mudarCapitulo(direcao) {
            capituloAtual += direcao;

            // Atualiza o texto na tela
            numDisplay.innerText = capituloAtual;

            // Desabilita botões nos limites
            prevBtn.disabled = (capituloAtual === 1);
            nextBtn.disabled = (capituloAtual === totalCapitulos);

            // Efeito visual de troca (opcional)
            mangaImg.style.opacity = 0.5;
            setTimeout(() => {
                mangaImg.style.opacity = 1;
            }, 200);
            
            console.log("Navegando para o capítulo: " + capituloAtual);
        }

        // Inicializa o estado do botão anterior
        prevBtn.disabled = true;
    </script>

</body>
</html>
